security:
    # Password hashers
    password_hashers:
        App\Entity\User: 'auto'

    # User providers
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    # Firewalls
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        
        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                default_target_path: app_home
                always_use_default_target_path: false
            logout:
                path: app_logout
                target: app_home
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800  # 1 week
                path: /
            login_throttling:
                max_attempts: 3                # <--- User is blocked after 3 failed attempts
                interval: '15 minutes'   
            user_checker: App\Security\BannedUserChecker


    # Role Hierarchy - Defines inheritance
    role_hierarchy:
        ROLE_ADMIN: [ROLE_PSYCHOLOGIST, ROLE_PATIENT]
        ROLE_PSYCHOLOGIST: [ROLE_PATIENT]

    # Access Control Rules - URL-based permissions
    access_control:
        # Public routes (no login required)
        - { path: ^/$, roles: PUBLIC_ACCESS }
        - { path: ^/home$, roles: PUBLIC_ACCESS }
        - { path: ^/about$, roles: PUBLIC_ACCESS }
        - { path: ^/services$, roles: PUBLIC_ACCESS }
        - { path: ^/contact$, roles: PUBLIC_ACCESS }
        - { path: ^/login$, roles: PUBLIC_ACCESS }
        - { path: ^/register$, roles: PUBLIC_ACCESS }
        - { path: ^/forgot-password$, roles: PUBLIC_ACCESS }
        - { path: ^/reset-password, roles: PUBLIC_ACCESS }
        
        # Dashboard - authenticated users only
        - { path: ^/dashboard, roles: ROLE_USER }
        
        # Content Library - authenticated users only
        - { path: ^/content, roles: ROLE_USER }
        
        # ============= EVENTS MODULE PERMISSIONS =============
        
        # Events listing - Anyone (including guests) can VIEW events
        - { path: ^/events$, roles: PUBLIC_ACCESS }
        - { path: ^/events/[0-9]+$, roles: PUBLIC_ACCESS }
        
        # Create event - Admin and Psychologist only (FIXED typo and combined)
        - { path: ^/events/new$, roles: [ROLE_ADMIN, ROLE_PSYCHOLOGIST] }

        # Edit event - Admin and Psychologist only (FIXED typo and combined)
        - { path: ^/events/[0-9]+/edit$, roles: [ROLE_ADMIN, ROLE_PSYCHOLOGIST] }

        # Delete event - Admin only
        - { path: ^/events/[0-9]+/delete$, roles: ROLE_ADMIN }
        
        # Statistics dashboard - Admin and Psychologist only (FIXED - combined)
        - { path: ^/statistics, roles: [ROLE_ADMIN, ROLE_PSYCHOLOGIST] }

        # Export event report - Admin only
        - { path: ^/events/[0-9]+/export-report$, roles: ROLE_ADMIN }
        
        # ============= REGISTRATION PERMISSIONS =============
        
        # Create registration - Patients only (self registration)
        - { path: ^/registration/event/[0-9]+/register$, roles: ROLE_PATIENT }
        
        # Create registration for others - Admin and Psychologist only
        - { path: ^/registration/event/[0-9]+/register-other$, roles: [ROLE_ADMIN, ROLE_PSYCHOLOGIST] }
        
        # Edit registration - Admin and Psychologist only
        - { path: ^/registration/[0-9]+/edit$, roles: [ROLE_ADMIN, ROLE_PSYCHOLOGIST] }
        
        # Cancel registration - Anyone logged in (controller checks ownership)
        - { path: ^/registration/[0-9]+/cancel$, roles: ROLE_USER }
        
        # Delete registration - Admin and Psychologist only
        - { path: ^/registration/[0-9]+/delete$, roles: [ROLE_ADMIN, ROLE_PSYCHOLOGIST] }
        
        # Download ticket - Anyone logged in (controller checks ownership)
        - { path: ^/registration/[0-9]+/download-ticket$, roles: ROLE_USER }
        
        # Download QR code - Anyone logged in (controller checks ownership)
        - { path: ^/registration/[0-9]+/download-qr$, roles: ROLE_USER }
        
        # Resend confirmation email - Admin and Psychologist only
        - { path: ^/registration/[0-9]+/resend-email$, roles: [ROLE_ADMIN, ROLE_PSYCHOLOGIST] }
        
        # ============= OTHER MODULES =============
        
        # Chatbot - authenticated users
        - { path: ^/chatbot, roles: ROLE_USER }
        
        # Calendar - authenticated users
        - { path: ^/calendar, roles: ROLE_USER }
        
        # Sessions - authenticated users
        - { path: ^/sessions, roles: ROLE_USER }
        
        # Assessments - authenticated users
        - { path: ^/assessment, roles: ROLE_USER }
        - { path: ^/take-assessment, roles: ROLE_USER }
        - { path: ^/result, roles: ROLE_USER }
        
        # Reviews - authenticated users
        - { path: ^/review, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10