controllers:
    resource:
        path: ../src/Controller/
        namespace: App\Controller
    type: attribute

app_forgot_password:
    path: /forgot-password
    controller: App\Controller\ForgotPasswordController::forgotPassword
    methods: [GET, POST]

app_reset_password:
    path: /reset-password/{token}
    controller: App\Controller\ForgotPasswordController::resetPassword
    methods: [GET, POST]