parameters:
    locale: 'en'
    app.supported_locales: ['en', 'fr', 'es', 'ar']

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # Geocoder Service for OpenStreetMap
    App\Service\GeocoderService:
        autowire: true
        arguments:
            $httpClient: '@http_client'

    # Groq Service
    App\Service\GroqService:
        autowire: true

    # BadWordFilter Service
    App\Service\BadWordFilterService:
        autowire: true

    # ReminderPopup Service
    App\Service\ReminderPopupService:
        autowire: true

    # Weather Service
    App\Service\WeatherService:
        autowire: true
        arguments:
            $httpClient: '@http_client'

    # GoogleMaps Service (if needed)
    App\Service\GoogleMapsService:
        arguments:
            $apiKey: '%env(GOOGLE_MAPS_API_KEY)%'

    # FaceRecognition Service
    App\Service\FaceRecognitionService:
        arguments:
            $projectDir: '%kernel.project_dir%'