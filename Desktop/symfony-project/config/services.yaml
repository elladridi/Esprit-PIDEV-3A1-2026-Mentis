# config/services.yaml
parameters:
    locale: 'en'
    app.supported_locales: ['en', 'fr', 'es', 'ar']

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # Geocoder Service for OpenStreetMap
    App\Service\GeocoderService:
        autowire: true
        arguments:
            $httpClient: '@http_client'