# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

parameters:
    # Email configuration
    env(SENDER_EMAIL): 'noreply@mentis.com'
    env(GOOGLE_MAPS_API_KEY): ''
    env(ZAI_API_KEY): ''
    env(AI_API_KEY): ''
    env(AI_API_URL): 'https://api.z.ai/v1/chat/completions'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # Explicit service configuration for EmailNotificationService
    App\Service\EmailNotificationService:
        arguments:
            $mailer: '@mailer.mailer'
            $senderEmail: '%env(SENDER_EMAIL)%'

    # Explicit service configuration for GoogleMapsService
    App\Service\GoogleMapsService:
        arguments:
            $apiKey: '%env(GOOGLE_MAPS_API_KEY)%'

    # AIChatService uses http_client and reads API key from environment
    App\Service\AIChatService:
        arguments:
            $httpClient: '@http_client'